name: Test

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

concurrency:
   group: test-${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

jobs:
   unit:
      name: Unit + typecheck + lint
      runs-on: ubuntu-latest
      timeout-minutes: 10
      steps:
         - uses: actions/checkout@v4

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 24
              cache: npm

         - run: npm ci

         - run: npm run typecheck
         - run: npm run lint
         - run: npm run test:run

   e2e:
      name: Playwright
      runs-on: ubuntu-latest
      timeout-minutes: 25
      env:
         # Local Supabase from the official CLI exposes deterministic
         # demo credentials — safe to inline for CI use only.
         NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
         NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
         SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
         DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
         CI: 'true'
      steps:
         - uses: actions/checkout@v4

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 24
              cache: npm

         - name: Install Supabase CLI
           uses: supabase/setup-cli@v1
           with:
              version: latest

         - name: Start local Supabase
           run: supabase start

         - run: npm ci

         - name: Apply migrations
           run: |
              npm run db:migrate
              supabase db push --local

         - name: Install Playwright browsers
           run: npx playwright install --with-deps chromium

         - name: Build Next
           run: npm run build

         - name: Start Next (background)
           run: nohup npm run start > /tmp/next.log 2>&1 &

         - name: Wait for Next
           run: |
              for i in {1..30}; do
                 curl -fs http://localhost:3000 > /dev/null && break
                 sleep 2
              done

         - name: Playwright tests
           run: PLAYWRIGHT_SKIP_DEV=1 npx playwright test

         - name: Upload report
           if: always()
           uses: actions/upload-artifact@v4
           with:
              name: playwright-report
              path: playwright-report/
              retention-days: 14
